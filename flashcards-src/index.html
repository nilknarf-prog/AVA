<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atena · Flashcards SRS · Delta</title>
  <meta name="description" content="Atena — módulo de flashcards com repetição espaçada (SRS) para concurso de Delegado (PC/PF). Revise questões Cebraspe/FGV por matéria e fixe prazos, súmulas e conceitos." />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>" />
  <script>
    // Aplica o tema antes da hidratação para evitar flash (chave unificada delta-theme).
    (function () {
      try {
        var t = localStorage.getItem('delta-theme');
        if (t === 'dark' || (!t && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
